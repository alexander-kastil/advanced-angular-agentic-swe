<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Customers</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (customers.isLoading()) {
      <p>Loading...</p>
    } @else {
      @for (c of customers.value() ?? []; track c.id) {
        <div class="customerrow">
          <span>{{ c.id }} - {{ c.name }}</span>
          <button mat-icon-button color="warn" (click)="deleteCustomer(c)">x</button>
        </div>
      }
    }
  </mat-card-content>
</mat-card>
