<div class="edit-form">
  <form (submit)="submit($event)">
    <mat-form-field>
      <mat-label>Id</mat-label>
      <input matInput [value]="customerModel().id" readonly />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput [formField]="customerForm.name" />
      @if (customerForm.name().touched() && customerForm.name().invalid()) {
        <mat-error>{{ customerForm.name().errors()[0].message }}</mat-error>
      }
    </mat-form-field>
    <div class="actions">
      <button mat-raised-button type="submit" color="primary" [disabled]="customerForm().invalid()">Save</button>
      <button mat-button type="button" (click)="cancel.emit()">Cancel</button>
    </div>
  </form>
</div>
