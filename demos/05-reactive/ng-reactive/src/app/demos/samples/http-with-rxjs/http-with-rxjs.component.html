<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>HTTP + switchMap + shareReplay</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-form-field appearance="outline">
      <mat-label>Filter skills</mat-label>
      <input matInput [formControl]="filter" placeholder="type to filter..." />
    </mat-form-field>

    @for (skill of skills$ | async; track skill.id) {
      <div>
        {{ skill.name }} <em>({{ skill.completed ? "done" : "pending" }})</em>
      </div>
    } @empty {
      <p>No results</p>
    }
  </mat-card-content>
</mat-card>
