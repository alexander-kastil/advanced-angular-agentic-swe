<div class="grid">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Subject (RxJS)</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>
        Uses <code>new Subject&lt;T&gt;()</code> + <code>.subscribe()</code> in
        parent.
      </p>
      <button mat-raised-button color="accent" (click)="emitViaSubject()">
        Emit via Subject
      </button>
      @for (entry of subjectLog(); track $index) {
        <div class="log-entry">{{ entry }}</div>
      }
    </mat-card-content>
  </mat-card>

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>output() Signal</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>
        Uses <code>output&lt;T&gt;()</code> — type-safe, no subscribe needed in
        parent.
      </p>
      <button mat-raised-button color="primary" (click)="emitViaOutput()">
        Emit via output()
      </button>
      @for (entry of outputLog(); track $index) {
        <div class="log-entry">{{ entry }}</div>
      }
    </mat-card-content>
  </mat-card>
</div>
