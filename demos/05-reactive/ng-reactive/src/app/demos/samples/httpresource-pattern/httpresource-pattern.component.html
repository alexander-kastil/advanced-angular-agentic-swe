<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>HttpResource Pattern</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (skillsResource.isLoading()) {
      <mat-progress-bar mode="indeterminate" />
      <p>Loading...</p>
    } @else if (skillsResource.error()) {
      <p>Error loading skills</p>
    } @else {
      <p>
        Status: <strong>Loaded</strong> —
        {{ skillsResource.value()?.length }} skills
      </p>
      <mat-chip-set>
        @for (skill of skillsResource.value(); track skill.id) {
          <mat-chip [highlighted]="skill.completed">{{ skill.name }}</mat-chip>
        }
      </mat-chip-set>
    }
  </mat-card-content>
</mat-card>
