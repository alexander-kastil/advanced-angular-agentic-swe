<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>HostBinding</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-slide-toggle
      [ngModel]="checked()"
      (ngModelChange)="checked.set($event)"
      color="primary"
    >
      Checked: {{ checked() }}
    </mat-slide-toggle>
  </mat-card-content>
</mat-card>
