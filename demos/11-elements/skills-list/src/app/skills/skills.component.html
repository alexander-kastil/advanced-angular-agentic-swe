<div class="container">
  <h1 class="centered">Current Skills</h1>
  <div class="addRow">
    <label for="skill-name">Add a skill</label>
    <input
      id="skill-name"
      type="text"
      [value]="skillName()"
      (input)="updateSkillName($event)"
    />
    <button type="button" (click)="addSkill()">Add Skill</button>
    <button type="button" (click)="saveSkills()">Save Skills</button>
  </div>
  <div class="centered">
    @if (hasSkills()) {
      <table>
        <colgroup>
          <col style="width: 10%" class="id-col" />
          <col style="width: 50%" />
          <col style="width: 15%" />
          <col style="width: 15%" />
          <col style="width: 10%" />
        </colgroup>
        <thead>
          <tr>
            <th class="id-col">ID</th>
            <th>Name</th>
            <th>Hours</th>
            <th>Completed</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (s of skills(); track s.id) {
            <tr>
              <td class="id-col">{{ s.id }}</td>
              <td>{{ s.name }}</td>
              <td>{{ s.hours }}</td>
              <td>{{ s.completed }}</td>
              <td>
                <button
                  type="button"
                  (click)="removeSkill(s)"
                  [attr.aria-label]="'Remove ' + s.name"
                >
                  Remove
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
      <h3 class="centered">Click Remove to delete a skill</h3>
    } @else {
      <div>Currently you have no skills</div>
      <div>Click "Add Skill" to add a skill</div>
    }
  </div>
</div>
